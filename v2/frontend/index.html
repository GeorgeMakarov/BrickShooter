<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrickShooter</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        box-sizing: border-box;
        margin: 0;
        min-height: 100vh;
        background: #0a1322;
        color: #e8eef7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
        gap: 12px;
      }
      header {
        text-align: center;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }

      /* The board has a fixed pixel size; absolute corners overlay the canvas */
      /* cells that never hold a brick (the 3x3 blocks outside the play area). */
      #board-frame {
        position: relative;
        width: 512px;
        height: 512px;
      }
      #game {
        width: 100%;
        height: 100%;
        border: 1px solid #2c3f5e;
        border-radius: 8px;
        overflow: hidden;
      }
      .corner {
        position: absolute;
        width: 96px;   /* 3 cells * 32 */
        height: 96px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 4px;
        box-sizing: border-box;
        pointer-events: none; /* children re-enable as needed */
      }
      .corner > * {
        pointer-events: auto;
      }
      .corner-tl { top: 0; left: 0; }
      .corner-tr { top: 0; right: 0; }
      .corner-bl { bottom: 0; left: 0; }
      .corner-br { bottom: 0; right: 0; }

      .corner-stat {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 6px;
        width: 100%;
        font-size: 12px;
        line-height: 1;
      }
      .corner-stat .label { opacity: 0.7; }
      .corner-stat .num {
        font-size: 16px;
        font-weight: 700;
        color: #f1c40f;
      }

      button {
        background: #233859;
        color: #e8eef7;
        border: 1px solid #3a5485;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 13px;
        cursor: pointer;
        width: 84px;
      }
      button:hover {
        background: #2f4a76;
      }

      .name-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #f1c40f;
        font-size: 14px;
        font-weight: 600;
        padding: 4px 6px;
        cursor: pointer;
        width: 84px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .name-btn:hover {
        background: #1a2640;
        border-color: #3a5485;
      }
      .mute-btn {
        background: transparent;
        border: 1px solid transparent;
        color: #e8eef7;
        font-size: 16px;
        line-height: 1;
        padding: 2px 6px;
        width: auto;
        cursor: pointer;
      }
      .mute-btn:hover {
        background: #1a2640;
        border-color: #3a5485;
      }
      .mute-btn.muted {
        opacity: 0.55;
      }
      .name-btn small {
        display: block;
        font-size: 11px;
        font-weight: 400;
        opacity: 0.7;
        color: #e8eef7;
        margin-bottom: 2px;
      }

      .diff {
        font-size: 11px;
        opacity: 0.75;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .diff select {
        background: #233859;
        color: #e8eef7;
        border: 1px solid #3a5485;
        padding: 3px 6px;
        border-radius: 4px;
        font-size: 12px;
        width: 84px;
      }

      /* --- overlay modal ----------------------------------------------- */
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      #overlay.hidden { display: none; }
      .hidden { display: none !important; }
      #overlay-msg { font-size: 24px; }
      #overlay-scores {
        background: #13213a;
        border: 1px solid #2c3f5e;
        border-radius: 6px;
        padding: 12px 18px;
        min-width: 260px;
        max-height: 260px;
        overflow-y: auto;
      }
      #overlay-scores h3 {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 600;
        opacity: 0.85;
      }
      #overlay-scores ol { margin: 0; padding-left: 28px; font-size: 13px; }
      #overlay-scores li {
        padding: 2px 0;
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #overlay-scores li.fresh { color: #f1c40f; font-weight: 600; }
      #overlay-input {
        background: #13213a;
        color: #e8eef7;
        border: 1px solid #3a5485;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 15px;
        min-width: 240px;
        text-align: center;
      }
      #overlay-input:focus {
        outline: none;
        border-color: #5478b5;
      }
      .overlay-buttons {
        display: flex;
        gap: 10px;
      }
      .overlay-buttons button {
        width: auto;
      }
      .overlay-buttons button.primary {
        background: #3a5485;
        border-color: #5478b5;
      }
      .overlay-buttons button.primary:hover {
        background: #4c6fa8;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>BrickShooter</h1>
    </header>
    <div id="board-frame">
      <div id="game"></div>

      <div class="corner corner-tl">
        <button id="name-btn" class="name-btn" title="Change name">
          <small>Player</small>
          <span id="player-name">—</span>
        </button>
        <button id="mute-btn" class="mute-btn" title="Toggle sound">🔊</button>
      </div>

      <div class="corner corner-tr">
        <div class="corner-stat">
          <span class="label">Level</span>
          <span class="num" id="level">1</span>
        </div>
        <div class="corner-stat">
          <span class="label">Score</span>
          <span class="num" id="score">0</span>
        </div>
        <button id="scores">Scores</button>
      </div>

      <div class="corner corner-bl">
        <button id="undo">Undo</button>
      </div>

      <div class="corner corner-br">
        <label class="diff">
          Difficulty
          <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <button id="new-game">New Game</button>
      </div>
    </div>

    <div id="overlay" class="hidden">
      <p id="overlay-msg"></p>
      <input id="overlay-input" class="hidden" type="text" maxlength="24" autocomplete="off" />
      <div id="overlay-scores"></div>
      <div id="overlay-actions" class="overlay-buttons"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
