<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BrickShooter</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
      }
      body {
        box-sizing: border-box;
        margin: 0;
        min-height: 100vh;
        background: #0a1322;
        color: #e8eef7;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
        gap: 12px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 20px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        font-weight: 600;
      }
      .score {
        font-size: 18px;
        opacity: 0.85;
      }
      .score span {
        font-weight: 600;
        color: #f1c40f;
      }
      button {
        background: #233859;
        color: #e8eef7;
        border: 1px solid #3a5485;
        padding: 8px 14px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      button:hover {
        background: #2f4a76;
      }
      #game {
        border: 1px solid #2c3f5e;
        border-radius: 8px;
        overflow: hidden;
      }
      #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
      }
      #overlay.hidden {
        display: none;
      }
      #overlay-msg {
        font-size: 24px;
      }
      #overlay-scores {
        background: #13213a;
        border: 1px solid #2c3f5e;
        border-radius: 6px;
        padding: 12px 18px;
        min-width: 260px;
        max-height: 260px;
        overflow-y: auto;
      }
      #overlay-scores h3 {
        margin: 0 0 8px;
        font-size: 15px;
        font-weight: 600;
        opacity: 0.85;
      }
      #overlay-scores ol {
        margin: 0;
        padding-left: 28px;
        font-size: 13px;
      }
      #overlay-scores li {
        padding: 2px 0;
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }
      #overlay-scores li.fresh {
        color: #f1c40f;
        font-weight: 600;
      }
      .diff {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        opacity: 0.85;
      }
      .overlay-buttons {
        display: flex;
        gap: 10px;
      }
      .overlay-buttons button.primary {
        background: #3a5485;
        border-color: #5478b5;
      }
      .overlay-buttons button.primary:hover {
        background: #4c6fa8;
      }
      .hidden {
        display: none !important;
      }
      .diff select {
        background: #233859;
        color: #e8eef7;
        border: 1px solid #3a5485;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>BrickShooter</h1>
      <span class="score">Score: <span id="score">0</span></span>
      <label class="diff">
        Difficulty
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="normal" selected>Normal</option>
          <option value="hard">Hard</option>
        </select>
      </label>
      <button id="new-game">New Game</button>
      <button id="undo">Undo</button>
      <button id="scores">Scores</button>
    </header>
    <div id="game"></div>
    <div id="overlay" class="hidden">
      <p id="overlay-msg"></p>
      <div id="overlay-scores"></div>
      <div id="overlay-actions" class="overlay-buttons"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
